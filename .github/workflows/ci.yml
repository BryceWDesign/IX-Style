name: ix-style-ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest -q

      - name: Run repository self-audit
        run: python scripts/run_repo_self_audit.py

      - name: Run automated sample scenarios
        run: python scripts/run_sample_scenarios.py

      - name: Run invariant checks
        run: python scripts/run_invariant_checks.py
